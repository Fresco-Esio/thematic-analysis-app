# Deploys the production bundle to GitHub Pages on every push to master.
# Pages is enabled automatically by configure-pages (enablement: true) —
# no manual repository-settings step required.
name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      # npm install (not ci): the lockfile is maintained on Windows, and
      # npm ci on Linux trips over optional platform-package entries
      # (npm/cli#4828). install stays lock-guided but tolerant.
      - run: npm install --no-audit --no-fund
      - run: npm run build
        env:
          # CRA promotes lint warnings to errors when CI=true; a tracked
          # pre-existing warning in Canvas.js would fail the deploy.
          CI: "false"
      - name: Dump npm debug logs
        if: failure()
        run: cat /home/runner/.npm/_logs/*.log || true
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
